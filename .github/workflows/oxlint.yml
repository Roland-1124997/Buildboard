name: Lint

on:
  push:
    branches: [main]

permissions: {}

jobs:
  oxlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      # alternatively use npm install / yarn install here
      - run: npm install --frozen-lockfile
      - run: npm run lint
